<!DOCTYPE html>
<html>
<head>
    <title>Form Biodata</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#ff9ecf,#ffcce6);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-form{
            width:450px;
            padding:35px;
            border-radius:20px;
            background:white;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        h2{
            color:#ff4d94;
            font-weight:bold;
        }

        .btn-pink{
            background:#ff4d94;
            color:white;
        }

        .btn-pink:hover{
            background:#e63c82;
            color:white;
        }

        .form-control:focus{
            border-color:#ff4d94;
            box-shadow:0 0 5px #ff4d94;
        }
    </style>
</head>

<body>

<div class="card-form">

    <h2 class="text-center mb-4">🌸 Form Biodata 🌸</h2>

    <form action="/" method="post">

        <div class="mb-3">
            <label>Nama Depan</label>
            <input type="text" name="namaDepan"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Nama Belakang</label>
            <input type="text" name="namaBelakang"
                   class="form-control">
        </div>

        <button type="submit"
                class="btn btn-pink w-100">
            💖 Kirim
        </button>

    </form>

</div>

</body>
</html>
